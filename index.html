<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Desk Planner</title>

<style>
body {
  font-family: "Segoe UI", Roboto, Arial, sans-serif;
  margin: 0;
  background: #f5f7fa;
}

.header {
  text-align: center;
  padding: 16px;
  font-size: 20px;
  font-weight: 600;
  color: white;
  background: linear-gradient(90deg, #0b3c66, #145a9c);
}

#controls {
  background: white;
  padding: 15px;
  margin: 15px;
  border-radius: 10px;
}

.labelTitle {
  font-size: 12px;
  font-weight: 600;
  margin-right: 6px;
}

select {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #0b3c66;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  margin-right: 6px;
}

.row1 { margin-bottom: 10px; }
.row2 { margin-top: 10px; margin-bottom: 12px; }

.mapBox {
  position: relative;
  max-width: 1200px;
  margin: 15px;
}

.mapBox img { width: 100%; }

.svgLayer {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
}

.svgLayer svg {
  width: 100%;
  height: auto;
}

#compareWrap {
  display: none;
  gap: 20px;
}

#compareWrap .mapBox {
  width: 50%;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  background: #eef2f7;
  margin-right: 8px;
  cursor: pointer;
}

#copyModal {
  display:none;
  position:fixed;
  top:100px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 6px 20px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="header">Level 11 Desk Planner</div>

<div id="controls">

  <div class="row1">
    <span class="labelTitle">Mode</span>
    <select id="mode">
      <option value="single">Single</option>
      <option value="compare">Compare</option>
    </select>

<span class="labelTitle">Day</span>
<select id="day"></select>

<span id="compareControls" style="display:none;">
  vs <select id="day2"></select>
</span>

  </div>

  <div id="editControls">

<div class="row2">
  <button onclick="openCopyTo()">📋 Copy</button>
  <button onclick="triggerTeamImport()">👥 Import Teams</button>
  <button onclick="exportCSV()">⬇ Export</button>
  <button onclick="undo()">↩ Undo</button>
  <button onclick="clearAll()">🗑 Reset</button>
  <button id="multiBtn" onclick="toggleMulti()">🧩 Multi</button>
  <button onclick="triggerImport()">📂 Import</button>
  <button onclick="addTeam()">➕ Add Team</button>
  <button onclick="clearAllData()">🧹 Clear All</button>
  <button onclick="clearDesks()">🧽 Clear Desks</button>
  <button onclick="exportImage()">📸 Export Image</button>
  <button onclick="window.open('help.html','_blank')">❓ Help</button>

</div>

<div><strong>Teams</strong></div>
<div id="legend"></div>
<div style="margin-top:15px; padding-top:10px; border-top:1px solid #eee;">
  <div><strong>Desk Allocation Summary</strong></div>
  <div id="summary" style="margin-top:6px;"></div>
</div>

</div>

<div id="copyModal">
  <strong>Copy To Days</strong><br><br>
  <div id="copyDays"></div>
  <br>
  <button onclick="applyCopy()">Apply</button>
  <button onclick="closeCopy()">Cancel</button>
</div>

<!-- SINGLE -->

<div id="mapSingle" class="mapBox">
  <img src="floorPlan.png">

  <!-- ✅ ADD THIS -->
  <div id="selectionBox" style="
    position:absolute;
    border:2px dashed #0b3c66;
    background:rgba(11,60,102,0.1);
    display:none;
    pointer-events:none;
  "></div>

  <div id="svgContainer" class="svgLayer"></div>
</div>

<!-- COMPARE -->

<div id="compareWrap">
  <div class="mapBox">
    <img src="floorPlan.png">
    <div id="svgContainer1" class="svgLayer"></div>
  </div>
  <div class="mapBox">
    <img src="floorPlan.png">
    <div id="svgContainer2" class="svgLayer"></div>
  </div>
</div>

<input type="file" id="fileInput" accept=".csv" style="display:none">
<input type="file" id="teamFileInput" accept=".csv" style="display:none">

<script>

let deskData = {};
let selectedDesks = [];
let history = [];
let multiMode = false;
let teamNames = {};

const names = ["Mon","Tue","Wed","Thu","Fri"];
const keys = ["mon","tue","wed","thu","fri"];

const teamColors = {
  T1:"#007bff", T2:"#6f42c1", T3:"#fd7e14",
  T4:"#20c997", T5:"#e83e8c", T6:"#17a2b8",
  T7:"#ffc107", T8:"#6610f2", T9:"#dc3545",
  T10:"#28a745"
};

// INIT DAYS
keys.forEach((k,i)=>{
  day.innerHTML+=`<option value="${k}">${names[i]}</option>`;
  day2.innerHTML+=`<option value="${k}">${names[i]}</option>`;
});

// LOAD SVG
function loadSVG(id, cb){
  fetch("deskPlan.svg")
  .then(r=>r.text())
  .then(svg=>{
    document.getElementById(id).innerHTML=svg;
    document.querySelector(`#${id} svg`).setAttribute("preserveAspectRatio","xMinYMin meet");
    cb && cb();
  });
}

loadSVG("svgContainer", ()=>{
  document.querySelectorAll("g[id^='desk']").forEach(d=>{
    deskData[d.id]={mon:"",tue:"",wed:"",thu:"",fri:""};
  });
  loadState();
  setupClick();
  buildLegend();
  render();
});


function getTeamColorFromId(teamId){
  const num = parseInt(teamId.replace("T",""));
  const hue = (num * 47) % 360;
  return `hsl(${hue}, 65%, 55%)`;
}

// STORAGE
function saveState(){
  const state = {
    deskData: deskData,
    teamNames: teamNames
  };

  localStorage.setItem("deskPlannerData", JSON.stringify(state));
}
function loadState(){
  const s = localStorage.getItem("deskPlannerData");
  if(!s) return;

  const state = JSON.parse(s);

  // backward compatibility (old saves)
  if(state.deskData){
    deskData = state.deskData;
    teamNames = state.teamNames || {};
  } else {
    deskData = state;
  }
}

// CLICK (disabled in compare)
function setupClick(){
  document.querySelector("#svgContainer svg").addEventListener("click",e=>{
    if(mode.value==="compare") return;

    const desk=e.target.closest("g[id^='desk']");
    if(!desk){ selectedDesks=[]; highlight(); return; }

    const id=desk.id;

    if(multiMode||e.ctrlKey){
      selectedDesks.includes(id)
        ? selectedDesks=selectedDesks.filter(d=>d!==id)
        : selectedDesks.push(id);
    } else selectedDesks=[id];

    highlight();
  });
}

// DRAG SELECTION
let isDragging = false;
let startX = 0;
let startY = 0;

const map = document.querySelector("#mapSingle");
const box = document.getElementById("selectionBox");

map.addEventListener("mousedown", e => {

  if(mode.value==="compare") return;

   // 🔥 ADD THIS LINE
  if(!e.shiftKey) return;

  // optional: only drag if NOT clicking a desk
  if(e.target.closest("g[id^='desk']")) return;

  isDragging = true;

  const rect = map.getBoundingClientRect();
  startX = e.clientX - rect.left;
  startY = e.clientY - rect.top;

  box.style.left = startX + "px";
  box.style.top = startY + "px";
  box.style.width = "0px";
  box.style.height = "0px";
  box.style.display = "block";
});

map.addEventListener("mousemove", e => {
  if(!isDragging) return;

  const rect = map.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  box.style.left = Math.min(startX,x) + "px";
  box.style.top = Math.min(startY,y) + "px";
  box.style.width = Math.abs(x - startX) + "px";
  box.style.height = Math.abs(y - startY) + "px";
});

map.addEventListener("mouseup", () => {
  if(!isDragging) return;

  isDragging = false;

  selectDesksInBox();   // 🔥 run BEFORE hiding

  box.style.display = "none";
});



// HIGHLIGHT
function highlight(){
  document.querySelectorAll("#svgContainer g[id^='desk']").forEach(d=>{
    const s=d.querySelector("rect,polygon,path");

    if(selectedDesks.includes(d.id)){
      s.setAttribute("stroke","#000");
      s.setAttribute("stroke-width","2.5");
      s.style.filter="drop-shadow(0 0 3px rgba(0,0,0,0.6))";
      s.style.opacity="1";
    } else {
      s.setAttribute("stroke","none");
      s.style.filter="none";
      s.style.opacity="0.85";
    }
  });
}



function selectDesksInBox(){

  const boxRect = document.getElementById("selectionBox").getBoundingClientRect();

  selectedDesks = [];

  document.querySelectorAll("#svgContainer g[id^='desk']").forEach(d => {

    const rect = d.getBoundingClientRect();

    // 👉 use center point of desk
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    const inside =
      centerX >= boxRect.left &&
      centerX <= boxRect.right &&
      centerY >= boxRect.top &&
      centerY <= boxRect.bottom;

    if(inside){
      selectedDesks.push(d.id);
    }
  });

  highlight();
}

// APPLY
function applyTeam(team){
  history.push(JSON.parse(JSON.stringify(deskData)));
  selectedDesks.forEach(id=>deskData[id][day.value]=team);
  saveState();
  render();
}

// COPY
function openCopyTo(){
  copyDays.innerHTML="";
  keys.forEach((k,i)=>{
    if(k===day.value) return;
    copyDays.innerHTML+=`<label><input type="checkbox" value="${k}"> ${names[i]}</label>`;
  });
  copyModal.style.display="block";
}

function applyCopy(){
  const selected=[...document.querySelectorAll("#copyDays input:checked")].map(c=>c.value);
  if(!selected.length) return;

  history.push(JSON.parse(JSON.stringify(deskData)));

  Object.keys(deskData).forEach(id=>{
    selected.forEach(d=>deskData[id][d]=deskData[id][day.value]);
  });

  saveState();
  closeCopy();
  render();
}

function closeCopy(){ copyModal.style.display="none"; }

// RENDER
function render(){
  if(mode.value==="compare"){
    renderCompare();
    return;
  }

  Object.keys(deskData).forEach(id=>{
    const desk=document.getElementById(id);
    if(!desk) return;

      const shape = desk.querySelector("rect,polygon,path");
      const t = deskData[id][day.value];

      // remove existing SVG title (prevents duplicates)
      const existingTitle = shape.querySelector("title");
      if(existingTitle) existingTitle.remove();

      if(t){
        const title = document.createElementNS("http://www.w3.org/2000/svg", "title");
        title.textContent = teamNames[t] ? `${t} ${teamNames[t]}` : t;
        shape.appendChild(title);
      }

    const teamIds = Object.keys(teamNames).sort((a,b)=>{
  return parseInt(a.slice(1)) - parseInt(b.slice(1));
});
const color = teamColors[t] || getTeamColorFromId(t);

shape.setAttribute("fill", color || "transparent");
  });

  updateSummary();
  highlight();
}

// COMPARE
function renderCompare(){
  renderInto("svgContainer1", day.value);
  renderInto("svgContainer2", day2.value);
}

function renderInto(container, d){
  Object.keys(deskData).forEach(id=>{
    const desk=document.querySelector(`#${container} #${id}`);
    if(!desk) return;

    const shape=desk.querySelector("rect,polygon,path");
    const t=deskData[id][d];

    shape.setAttribute("fill",t?teamColors[t]:"transparent");
  });
}

// MODE SWITCH
mode.addEventListener("change",()=>{

  if(mode.value==="compare"){
    editControls.style.display="none";
    compareControls.style.display="inline";
    mapSingle.style.display="none";
    compareWrap.style.display="flex";

    loadSVG("svgContainer1");
    loadSVG("svgContainer2", renderCompare);

  } else {
    editControls.style.display="block";
    compareControls.style.display="none";
    mapSingle.style.display="block";
    compareWrap.style.display="none";

    render();
  }
});

day.addEventListener("change", render);
day2.addEventListener("change", renderCompare);

// LEGEND
function buildLegend(){

  legend.innerHTML = "";

  const teamIds = Object.keys(teamNames).sort((a,b)=>{
  return parseInt(a.slice(1)) - parseInt(b.slice(1));
});

  teamIds.forEach((t, i)=>{

    const chip = document.createElement("div");
    chip.className = "chip";

    const color = teamColors[t] || getTeamColorFromId(t);

    chip.innerHTML = `
      <span style="
        width:10px;
        height:10px;
        background:${color};
        border-radius:50%;
        display:inline-block;
      "></span>
      ${t} ${teamNames[t]}
    `;

    chip.onclick = () => selectedDesks.length && applyTeam(t);

    legend.appendChild(chip);
  });

}


// SUMMARY
function updateSummary(){

  const d = day.value;
  const total = Object.keys(deskData).length;

  let assigned = 0;
  let teamCounts = {};

  // count assignments
  Object.values(deskData).forEach(v => {
    const t = v[d];

    if (t) {
      assigned++;
      teamCounts[t] = (teamCounts[t] || 0) + 1;
    }
  });

  // base summary
  let html = `
    <strong>Total:</strong> ${total} |
    <strong>Assigned:</strong> ${assigned} |
    <strong>Free:</strong> ${total - assigned}
    <br>
  `;

// team breakdown (dynamic)
const teamIds = Object.keys(teamNames).length
  ? Object.keys(teamNames).sort((a,b)=>parseInt(a.slice(1))-parseInt(b.slice(1)))
  : Object.keys(teamColors);

teamIds.forEach((t, i) => {
  html += `
  <span style="
    display:inline-block;
    padding:2px 8px;
    border-radius:12px;
    background:${teamColors[t] || getTeamColorFromId(t)};
    color:white;
    font-size:11px;
    margin-right:6px;
  ">
    ${t}: ${teamCounts[t] || 0}
  </span>
  `;
});

  summary.innerHTML = html;
}

// OTHER
function toggleMulti(){
  multiMode = !multiMode;
  multiBtn.innerText = "🧩 Multi " + (multiMode ? "ON" : "OFF");

  multiBtn.style.background = multiMode ? "#28a745" : "#0b3c66";
}

function undo(){
  if(!history.length) return;
  deskData=history.pop();
  saveState();
  render();
}


//CSV DESK DATA IMPORT
function triggerImport(){
  const input = document.getElementById("fileInput");
  input.value = "";
  input.click();
}

document.getElementById("fileInput").addEventListener("change", e => {

  const f = e.target.files[0];
  if (!f) return;

  const r = new FileReader();

  r.onload = e => {

    const rows = e.target.result.split("\n");

    rows.slice(1).forEach(row => {

      const c = row.split(",");

      if (!deskData[c[0]]) return;

      // assign IDs
      keys.forEach((d,i)=>{
        deskData[c[0]][d] = (c[i+1] || "").trim();
      });

      // ✅ NEW: restore team names from CSV
      if (c.length >= 11) {

        const nameCols = c.slice(6,11);

        nameCols.forEach((name, i) => {

          const teamId = c[i+1];

          if (teamId && name) {
            teamNames[teamId.trim()] = name.trim();
          }

        });
      }

    });

    saveState();
    buildLegend();   // rebuild legend with names
    render();

  };

  r.readAsText(f);
});


//ADD NEW TEAM NAME
function addTeam(){

  // get existing team numbers
  const existing = Object.keys(teamNames)
    .map(t => parseInt(t.replace("T","")))
    .filter(n => !isNaN(n));

  // find lowest available number
  let newNum = 1;
  while(existing.includes(newNum)){
    newNum++;
  }

  const newId = "T" + newNum;

  // ask user for name
  const name = prompt(`Enter name for ${newId}:`);
  if(!name) return;

  // add to team list
  teamNames[newId] = name.trim();

  // rebuild UI
  buildLegend();
  render();
}


function exportCSV(){

  let fileName = prompt("Enter file name:", "desk-data");
  if (!fileName) return;

  fileName = fileName.replace(/\.csv$/i, "");

  // header
  let csv = "desk,mon,tue,wed,thu,fri,mon_name,tue_name,wed_name,thu_name,fri_name\n";

  Object.keys(deskData).forEach(d => {

    const r = deskData[d];

    // IDs
    const mon = r.mon || "";
    const tue = r.tue || "";
    const wed = r.wed || "";
    const thu = r.thu || "";
    const fri = r.fri || "";

    // Names
    const monName = teamNames[mon] || "";
    const tueName = teamNames[tue] || "";
    const wedName = teamNames[wed] || "";
    const thuName = teamNames[thu] || "";
    const friName = teamNames[fri] || "";

    csv += `${d},${mon},${tue},${wed},${thu},${fri},${monName},${tueName},${wedName},${thuName},${friName}\n`;
  });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv]));
  a.download = fileName + ".csv";
  a.click();
}

function clearAll(){
  if(!confirm("Clear all data?")) return;
  localStorage.removeItem("deskPlannerData");
  location.reload();
}

function triggerTeamImport(){
  const input = document.getElementById("teamFileInput");
  input.value = "";   // 🔥 THIS is the fix
  input.click();
}

document.getElementById("teamFileInput").addEventListener("change", e => {

  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e){

    const lines = e.target.result.split("\n");

    teamNames = {}; // reset

      lines.slice(1).forEach(line => {

        const parts = line.split(",");

        if (parts.length < 2) return;

        const id = parts[0].trim().replace(/\r/g,"");
        const name = parts[1].trim().replace(/\r/g,"");

        if (id && name) {
          teamNames[id] = name;
        }

      });

    // rebuild legend with names
    legend.innerHTML = "";
    buildLegend();
    saveState();
    render();
  };

  reader.readAsText(file);
});

function clearAllData(){

  if(!confirm("Clear all desk allocations AND teams?")) return;

  // clear desk assignments
  Object.keys(deskData).forEach(id=>{
    keys.forEach(d=>{
      deskData[id][d] = "";
    });
  });

  // clear teams
  teamNames = {};

  // clear selection + history
  selectedDesks = [];
  history = [];

  // persist change
  saveState();

  // rebuild UI
  buildLegend();
  render();
}


//CLEAR DESKS
function clearDesks(){

  if(!confirm("Clear desk allocations?")) return;

  history.push(JSON.parse(JSON.stringify(deskData)));

  const d = day.value;

  // if desks selected → clear only those
  if(selectedDesks.length){
    selectedDesks.forEach(id=>{
      deskData[id][d] = "";
    });
  } 
  // otherwise clear entire day
  else {
    Object.keys(deskData).forEach(id=>{
      deskData[id][d] = "";
    });
  }

  saveState();
  render();
}


//EXPORT IMAGE
function exportImage(){

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  img.src = "floorPlan.png";

  img.onload = () => {

    const width = img.width;
    const height = img.height;

    const bannerHeight = 70;
    const summaryHeight = 180;

    canvas.width = width;
    canvas.height = height + bannerHeight + summaryHeight;

    // background
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // ===== HEADER BANNER =====
    ctx.fillStyle = "#0b3c66";
    ctx.fillRect(0, 0, width, bannerHeight);

    ctx.fillStyle = "#ffffff";
    ctx.textAlign = "center";

    // Title
    ctx.font = "bold 26px Segoe UI";
    ctx.fillText("L11 Desk Planner", width / 2, 30);

    // Day
    ctx.font = "16px Segoe UI";
    ctx.fillText(day.options[day.selectedIndex].text, width / 2, 55);

    // ===== FLOOR PLAN =====
    ctx.drawImage(img, 0, bannerHeight);

    // ===== SVG OVERLAY =====
    const svg = document.querySelector("#svgContainer svg");
    const svgData = new XMLSerializer().serializeToString(svg);
    const svgBlob = new Blob([svgData], {type:"image/svg+xml"});
    const url = URL.createObjectURL(svgBlob);

    const svgImg = new Image();

    svgImg.onload = () => {

      ctx.drawImage(svgImg, 0, bannerHeight);

      // ===== SUMMARY DATA =====
      const d = day.value;

      let teamCounts = {};
      Object.values(deskData).forEach(v=>{
        if(v[d]) teamCounts[v[d]] = (teamCounts[v[d]]||0)+1;
      });

      const teamIds = Object.keys(teamNames)
        .sort((a,b)=>parseInt(a.slice(1))-parseInt(b.slice(1)));

      let yStart = bannerHeight + height + 40;

      // ===== SUMMARY TITLE =====
      ctx.fillStyle = "#000";
      ctx.textAlign = "center";
      ctx.font = "bold 18px Segoe UI";
      ctx.fillText("Desk Allocation Summary", width / 2, yStart);

      yStart += 30;

      // ===== SUMMARY GRID =====
      ctx.font = "14px Segoe UI";

      const itemsPerRow = Math.max(1, Math.floor(width / 260));
      const colWidth = width / itemsPerRow;

      teamIds.forEach((t, i) => {

        const col = i % itemsPerRow;
        const row = Math.floor(i / itemsPerRow);

        const x = col * colWidth + 20;
        const y = yStart + (row * 26);

        const color = teamColors[t] || getTeamColorFromId(t);

        // ===== COLOUR BUBBLE =====
        ctx.beginPath();
        ctx.arc(x + 8, y - 6, 6, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();

        // ===== TEXT =====
        ctx.fillStyle = "#000";
        ctx.textAlign = "left";

        ctx.fillText(
          `${t} ${teamNames[t]}: ${teamCounts[t] || 0}`,
          x + 20,
          y
        );
      });

      // ===== DOWNLOAD =====
      const link = document.createElement("a");
      link.download = "desk-plan.png";
      link.href = canvas.toDataURL();
      link.click();
    };

    svgImg.src = url;
  };
}

</script>

</body>
</html>
