<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Desk Planner</title>

<style>
body {
  font-family: "Segoe UI", Roboto, Arial, sans-serif;
  margin: 0;
  background: #f5f7fa;
}

.header {
  text-align: center;
  padding: 16px;
  font-size: 20px;
  font-weight: 600;
  color: white;
  background: linear-gradient(90deg, #0b3c66, #145a9c);
}

#controls {
  background: white;
  padding: 15px;
  margin: 15px;
  border-radius: 10px;
}

.labelTitle {
  font-size: 12px;
  font-weight: 600;
  margin-right: 6px;
}

select {
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #0b3c66;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  margin-right: 6px;
}

.row1 { margin-bottom: 10px; }
.row2 { margin-top: 10px; margin-bottom: 12px; }

.mapBox {
  position: relative;
  max-width: 1200px;
  margin: 15px;
}

.mapBox img { width: 100%; }

.svgLayer {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
}

.svgLayer svg {
  width: 100%;
  height: auto;
}

#compareWrap {
  display: none;
  gap: 20px;
}

#compareWrap .mapBox {
  width: 50%;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  background: #eef2f7;
  margin-right: 8px;
  cursor: pointer;
}

#copyModal {
  display:none;
  position:fixed;
  top:100px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 6px 20px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="header">Level 11 Desk Planner</div>

<div id="controls">

  <div class="row1">
    <span class="labelTitle">Mode</span>
    <select id="mode">
      <option value="single">Single</option>
      <option value="compare">Compare</option>
    </select>

<span class="labelTitle">Day</span>
<select id="day"></select>

<span id="compareControls" style="display:none;">
  vs <select id="day2"></select>
</span>

  </div>

  <div id="editControls">

<div class="row2">
  <button onclick="openCopyTo()">📋 Copy</button>
  <button onclick="triggerTeamImport()">👥 Import Teams</button>
  <button onclick="exportCSV()">⬇ Export</button>
  <button onclick="undo()">↩ Undo</button>
  <button onclick="clearAll()">🗑 Reset</button>
  <button id="multiBtn" onclick="toggleMulti()">🧩 Multi</button>
  <button onclick="triggerImport()">📂 Import</button>
  <button onclick="addTeam()">➕ Add Team</button>
  <button onclick="clearAllData()">🧹 Clear All</button>
  <button onclick="clearDesks()">🧽 Clear Desks</button>
  <button onclick="exportImage()">📸 Export Image</button>
  <button onclick="window.open('help.html','_blank')">❓ Help</button>

</div>

<div><strong>Teams</strong></div>
<div id="legend"></div>
<div style="margin-top:15px; padding-top:10px; border-top:1px solid #eee;">
  <div><strong>Desk Allocation Summary</strong></div>
  <div id="summary" style="margin-top:6px;"></div>
</div>

</div>

<div id="copyModal">
  <strong>Copy To Days</strong><br><br>
  <div id="copyDays"></div>
  <br>
  <button onclick="applyCopy()">Apply</button>
  <button onclick="closeCopy()">Cancel</button>
</div>

<!-- SINGLE -->

<div id="mapSingle" class="mapBox">
  <img src="floorPlan.png">
  <div id="svgContainer" class="svgLayer"></div>
</div>

<!-- COMPARE -->

<div id="compareWrap">
  <div class="mapBox">
    <img src="floorPlan.png">
    <div id="svgContainer1" class="svgLayer"></div>
  </div>
  <div class="mapBox">
    <img src="floorPlan.png">
    <div id="svgContainer2" class="svgLayer"></div>
  </div>
</div>

<input type="file" id="fileInput" accept=".csv" style="display:none">
<input type="file" id="teamFileInput" accept=".csv" style="display:none">

<script>

/* ======================================================
   GLOBAL STATE & CONFIG
====================================================== */

let deskData = {};
let selectedDesks = [];
let history = [];
let multiMode = false;
let teamNames = {};

const names = ["Mon","Tue","Wed","Thu","Fri"];
const keys = ["mon","tue","wed","thu","fri"];

const teamColors = {
  T1:"#007bff", T2:"#6f42c1", T3:"#fd7e14",
  T4:"#20c997", T5:"#e83e8c", T6:"#17a2b8",
  T7:"#ffc107", T8:"#6610f2", T9:"#dc3545",
  T10:"#28a745"
};

/* ======================================================
   INITIALISATION
====================================================== */

// populate day dropdowns
keys.forEach((k,i)=>{
  day.innerHTML+=`<option value="${k}">${names[i]}</option>`;
  day2.innerHTML+=`<option value="${k}">${names[i]}</option>`;
});

// load SVG + initialise desks
loadSVG("svgContainer", ()=>{
  document.querySelectorAll("g[id^='desk']").forEach(d=>{
    deskData[d.id]={mon:"",tue:"",wed:"",thu:"",fri:""};
  });

  loadState();
  setupClick();
  buildLegend();
  render();
});

/* ======================================================
   STORAGE
====================================================== */

function saveState(){
  localStorage.setItem("deskPlannerData", JSON.stringify({
    deskData,
    teamNames
  }));
}

function loadState(){
  const s = localStorage.getItem("deskPlannerData");
  if(!s) return;

  const state = JSON.parse(s);

  if(state.deskData){
    deskData = state.deskData;
    teamNames = state.teamNames || {};
  } else {
    deskData = state;
  }
}

/* ======================================================
   SVG LOADING
====================================================== */

function loadSVG(id, cb){
  fetch("deskPlan.svg")
    .then(r=>r.text())
    .then(svg=>{
      document.getElementById(id).innerHTML=svg;
      document.querySelector(`#${id} svg`)
        .setAttribute("preserveAspectRatio","xMinYMin meet");
      cb && cb();
    });
}

/* ======================================================
   INTERACTION (CLICK / SELECT)
====================================================== */

function setupClick(){
  document.querySelector("#svgContainer svg")
    .addEventListener("click",e=>{

      if(mode.value==="compare") return;

      const desk=e.target.closest("g[id^='desk']");
      if(!desk){
        selectedDesks=[];
        highlight();
        return;
      }

      const id=desk.id;

      if(multiMode||e.ctrlKey){
        selectedDesks.includes(id)
          ? selectedDesks=selectedDesks.filter(d=>d!==id)
          : selectedDesks.push(id);
      } else selectedDesks=[id];

      highlight();
    });
}

/* ======================================================
   RENDERING
====================================================== */

function render(){
  if(mode.value==="compare"){
    renderCompare();
    return;
  }

  Object.keys(deskData).forEach(id=>{
    const desk=document.getElementById(id);
    if(!desk) return;

    const shape = desk.querySelector("rect,polygon,path");
    const t = deskData[id][day.value];

    // tooltip (SVG native)
    const existingTitle = shape.querySelector("title");
    if(existingTitle) existingTitle.remove();

    if(t){
      const title = document.createElementNS("http://www.w3.org/2000/svg", "title");
      title.textContent = teamNames[t] ? `${t} ${teamNames[t]}` : t;
      shape.appendChild(title);
    }

    const color = teamColors[t] || getTeamColorFromId(t);
    shape.setAttribute("fill", color || "transparent");
  });

  updateSummary();
  highlight();
}

/* ======================================================
   COMPARE MODE
====================================================== */

function renderCompare(){
  renderInto("svgContainer1", day.value);
  renderInto("svgContainer2", day2.value);
}

function renderInto(container, d){
  Object.keys(deskData).forEach(id=>{
    const desk=document.querySelector(`#${container} #${id}`);
    if(!desk) return;

    const shape=desk.querySelector("rect,polygon,path");
    const t=deskData[id][d];

    shape.setAttribute("fill",t?teamColors[t]:"transparent");
  });
}

/* ======================================================
   HIGHLIGHT
====================================================== */

function highlight(){
  document.querySelectorAll("#svgContainer g[id^='desk']")
    .forEach(d=>{
      const s=d.querySelector("rect,polygon,path");

      if(selectedDesks.includes(d.id)){
        s.setAttribute("stroke","#000");
        s.setAttribute("stroke-width","2.5");
        s.style.filter="drop-shadow(0 0 3px rgba(0,0,0,0.6))";
      } else {
        s.setAttribute("stroke","none");
        s.style.filter="none";
      }
    });
}

/* ======================================================
   LEGEND & SUMMARY
====================================================== */

function buildLegend(){
  legend.innerHTML = "";

  const teamIds = Object.keys(teamNames)
    .sort((a,b)=>parseInt(a.slice(1))-parseInt(b.slice(1)));

  teamIds.forEach(t=>{
    const chip = document.createElement("div");
    chip.className = "chip";

    const color = teamColors[t] || getTeamColorFromId(t);

    chip.innerHTML = `
      <span style="
        width:10px;height:10px;
        background:${color};
        border-radius:50%;
        display:inline-block;
      "></span>
      ${t} ${teamNames[t]}
    `;

    chip.onclick = () => selectedDesks.length && applyTeam(t);
    legend.appendChild(chip);
  });
}

function updateSummary(){
  const d = day.value;
  const total = Object.keys(deskData).length;

  let assigned = 0;
  let teamCounts = {};

  Object.values(deskData).forEach(v=>{
    if(v[d]){
      assigned++;
      teamCounts[v[d]]=(teamCounts[v[d]]||0)+1;
    }
  });

  let html = `
    <strong>Total:</strong> ${total} |
    <strong>Assigned:</strong> ${assigned} |
    <strong>Free:</strong> ${total-assigned}<br>
  `;

  const teamIds = Object.keys(teamNames)
    .sort((a,b)=>parseInt(a.slice(1))-parseInt(b.slice(1)));

  teamIds.forEach(t=>{
    html += `
      <span style="
        display:inline-block;
        padding:2px 8px;
        border-radius:12px;
        background:${teamColors[t]||getTeamColorFromId(t)};
        color:white;
        font-size:11px;
        margin-right:6px;
      ">
        ${t}: ${teamCounts[t]||0}
      </span>
    `;
  });

  summary.innerHTML = html;
}

/* ======================================================
   ACTIONS
====================================================== */

function applyTeam(team){
  history.push(JSON.parse(JSON.stringify(deskData)));
  selectedDesks.forEach(id=>deskData[id][day.value]=team);
  saveState();
  render();
}

function toggleMulti(){
  multiMode=!multiMode;
  multiBtn.innerText="🧩 Multi "+(multiMode?"ON":"OFF");
  multiBtn.style.background = multiMode ? "#28a745" : "#0b3c66";
}

function undo(){
  if(!history.length) return;
  deskData=history.pop();
  saveState();
  render();
}

function clearDesks(){
  if(!confirm("Clear desk allocations?")) return;

  history.push(JSON.parse(JSON.stringify(deskData)));

  const d = day.value;

  if(selectedDesks.length){
    selectedDesks.forEach(id=>deskData[id][d]="");
  } else {
    Object.keys(deskData).forEach(id=>deskData[id][d]="");
  }

  saveState();
  render();
}

function clearAllData(){
  if(!confirm("Clear all desk allocations AND teams?")) return;

  Object.keys(deskData).forEach(id=>{
    keys.forEach(d=>deskData[id][d]="");
  });

  teamNames={};
  selectedDesks=[];
  history=[];

  saveState();
  buildLegend();
  render();
}

/* ======================================================
   IMPORT / EXPORT
====================================================== */

function triggerImport(){
  const input = fileInput;
  input.value = "";   // 🔥 reset so same file can be selected again
  input.click();
}

function triggerTeamImport(){
  const input = teamFileInput;
  input.value = "";   // 🔥 reset so same file can be selected again
  input.click();
}

function exportCSV(){
  let fileName = prompt("Enter file name:", "desk-data");
  if (!fileName) return;

  let csv="desk,mon,tue,wed,thu,fri,mon_name,tue_name,wed_name,thu_name,fri_name\n";

  Object.keys(deskData).forEach(d=>{
    const r=deskData[d];
    csv += `${d},${r.mon||""},${r.tue||""},${r.wed||""},${r.thu||""},${r.fri||""},${teamNames[r.mon]||""},${teamNames[r.tue]||""},${teamNames[r.wed]||""},${teamNames[r.thu]||""},${teamNames[r.fri]||""}\n`;
  });

  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv]));
  a.download=fileName+".csv";
  a.click();
}

/* ======================================================
   UTILITIES
====================================================== */

function getTeamColorFromId(teamId){
  const num=parseInt(teamId.replace("T",""));
  return `hsl(${(num*47)%360},65%,55%)`;
}

</script>


</body>
</html>
